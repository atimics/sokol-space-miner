<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Permissions-Policy" content="cross-origin-isolated=(self)">
    <title>Signal — Play</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Condensed:wght@400;500;600&display=swap");

      :root {
        color-scheme: dark;
        --bg: #080706;
        --panel: rgba(10, 10, 9, 0.84);
        --line: rgba(245, 239, 223, 0.14);
        --ink: #f5efdf;
        --muted: #cfc3ad;
        --signal: #80ffd5;
        --ore: #f1b566;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 16% 18%, rgba(241, 181, 102, 0.08), transparent 26%),
          radial-gradient(circle at 86% 76%, rgba(128, 255, 213, 0.08), transparent 24%),
          var(--bg);
      }

      body {
        color: var(--ink);
        font-family: "IBM Plex Sans Condensed", "Arial Narrow", sans-serif;
      }

      #loading {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--signal);
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: var(--bg);
        transition: opacity 0.4s;
      }

      #loading.done {
        opacity: 0;
        pointer-events: none;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

    </style>
  </head>
  <body>
    <div id="loading">Linking signal chain...</div>


    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <script type="module" src="voicebox.js"></script>
    <script>
      var canvas = document.getElementById('canvas');

      var Module = {
        canvas: canvas,
        print: function(text) { console.log(text); },
        printErr: function(text) { console.error(text); }
      };

      /* Default SIGNAL_SERVER to the local docker websocket when this
       * page is served from localhost / 127.0.0.1 / a private LAN IP.
       * Without this, opening http://localhost:8080/signal.html stays in
       * singleplayer and the docker signal_server on :9091 is unused —
       * which means no global highscores, no other players, no chain.
       * Production CDN sets window.SIGNAL_SERVER explicitly before this
       * script runs, so this default never fires there. */
      if (!window.SIGNAL_SERVER) {
        var h = window.location.hostname;
        var isLocal = (h === 'localhost' || h === '127.0.0.1' || h === '0.0.0.0'
                    || /^192\.168\./.test(h) || /^10\./.test(h)
                    || /^172\.(1[6-9]|2[0-9]|3[01])\./.test(h));
        if (isLocal) window.SIGNAL_SERVER = 'ws://' + h + ':9091/ws';
      }

      canvas.addEventListener('pointerdown', function() {
        canvas.focus();
      });

      /* Prevent browser from stealing game keys. Tab is a docked-UI key
       * now (tab strip cycling) so we must preventDefault on it too;
       * otherwise focus escapes the canvas on the first Tab press. */
      window.addEventListener('keydown', function(e) {
        if (document.activeElement === canvas || e.target === document.body) {
          if (['F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12'].indexOf(e.key) === -1) {
            e.preventDefault();
          }
        }
      });

      function loadGame(src, version) {
        /* Cache-bust both signal.js and the wasm fetch by routing
         * through Module.locateFile. Without this, browsers happily
         * keep the previous build's bundle and the HUD shows
         * "syncing..." forever (client_hash != server_hash). */
        if (version) {
          var bust = (src.indexOf('?') >= 0 ? '&' : '?') + 'v=' + encodeURIComponent(version);
          src = src + bust;
          var prevLocate = Module.locateFile;
          Module.locateFile = function(path, prefix) {
            var base = prevLocate ? prevLocate(path, prefix) : ((prefix || '') + path);
            return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'v=' + encodeURIComponent(version);
          };
        }
        var s = document.createElement('script');
        s.src = src;
        s.onload = function() {
          document.getElementById('loading').classList.add('done');
          canvas.focus();
        };
        document.body.appendChild(s);
      }

      /* Pin the WASM bundle to whatever version the server is running.
       * Prevents silent wire desync when the server lags behind the CDN:
       * if /play/v/<server_hash>/ exists on CDN, we load that bundle
       * instead of ./signal.js (which may have newer wire format).
       * Any failure path (no SIGNAL_SERVER, /health down, dev build,
       * archive missing, timeout) falls back to the latest root bundle. */
      (function pickBundle() {
        var ws = window.SIGNAL_SERVER || '';
        if (!ws) { loadGame('./signal.js'); return; }
        var healthUrl = ws.replace(/^ws/, 'http').replace(/\/ws$/, '/health');

        var timedOut = false;
        var timer = setTimeout(function() {
          timedOut = true;
          loadGame('./signal.js');
        }, 3000);

        fetch(healthUrl, { cache: 'no-store' })
          .then(function(r) { return r.json(); })
          .then(function(info) {
            if (timedOut) return;
            clearTimeout(timer);
            var v = info && info.version;
            if (!v || v === 'dev') { loadGame('./signal.js'); return; }
            var pinned = '/play/v/' + encodeURIComponent(v) + '/signal.js';
            fetch(pinned, { method: 'HEAD' })
              .then(function(r) { loadGame(r.ok ? pinned : './signal.js', v); })
              .catch(function() { loadGame('./signal.js', v); });
          })
          .catch(function() {
            if (timedOut) return;
            clearTimeout(timer);
            loadGame('./signal.js');
          });
      })();
    </script>
  </body>
</html>
