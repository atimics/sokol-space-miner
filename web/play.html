<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signal — Play</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Condensed:wght@400;500;600&display=swap");

      :root {
        color-scheme: dark;
        --bg: #080706;
        --panel: rgba(10, 10, 9, 0.84);
        --line: rgba(245, 239, 223, 0.14);
        --ink: #f5efdf;
        --muted: #cfc3ad;
        --signal: #80ffd5;
        --ore: #f1b566;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 16% 18%, rgba(241, 181, 102, 0.08), transparent 26%),
          radial-gradient(circle at 86% 76%, rgba(128, 255, 213, 0.08), transparent 24%),
          var(--bg);
      }

      body {
        color: var(--ink);
        font-family: "IBM Plex Sans Condensed", "Arial Narrow", sans-serif;
      }

      #loading {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--signal);
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: var(--bg);
        transition: opacity 0.4s;
      }

      #loading.done {
        opacity: 0;
        pointer-events: none;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

    </style>
  </head>
  <body>
    <div id="loading">Linking signal chain...</div>


    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <script>
      var canvas = document.getElementById('canvas');

      var Module = {
        canvas: canvas,
        print: function(text) { console.log(text); },
        printErr: function(text) { console.error(text); }
      };

      canvas.addEventListener('pointerdown', function() {
        canvas.focus();
      });

      /* Prevent browser from stealing game keys (Tab, F, E, etc.) */
      window.addEventListener('keydown', function(e) {
        if (document.activeElement === canvas || e.target === document.body) {
          if (['Tab','F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12'].indexOf(e.key) === -1) {
            e.preventDefault();
          }
        }
      });

      var script = document.createElement('script');
      script.src = './signal.js';
      script.onload = function() {
        document.getElementById('loading').classList.add('done');
        canvas.focus();
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
