<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Permissions-Policy" content="cross-origin-isolated=(self)">
    <title>Signal</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        background:
          radial-gradient(circle at top, rgba(40, 70, 120, 0.25), transparent 40%),
          linear-gradient(180deg, #09111f 0%, #04070c 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        overflow: hidden;
        color: #dce9ff;
      }

      .shell {
        width: 100vw;
        height: 100dvh;
      }

      .hero {
        display: none;
      }

      .hero-copy {
        display: none;
      }

      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(150, 198, 255, 0.74);
      }

      .title {
        font-size: clamp(20px, 2.8vw, 34px);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .subtitle {
        font-size: 13px;
        color: rgba(220, 233, 255, 0.72);
      }

      .frame {
        width: 100vw;
        height: 100dvh;
        overflow: hidden;
        background: transparent;
        position: relative;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
      }

      @media (max-width: 760px), (max-height: 680px) {
        .hero {
          display: none;
        }
      }

    </style>
  </head>
  <body>
    <div class="shell">
      <div class="hero">
        <div class="hero-copy">
          <div class="eyebrow">Industrial Frontier</div>
          <div class="title">Signal</div>
          <div class="subtitle">Keep the belt connected.</div>
        </div>
      </div>
      <div class="frame">
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
      </div>
    </div>
    <script>
      var Module = {
        canvas: document.getElementById("canvas"),
        print: function (text) {
          console.log(text);
        },
        printErr: function (text) {
          console.error(text);
        }
      };

      /* ?singleplayer=1 forces the in-process server for local smoke
       * tests and client-only iteration. Otherwise, default
       * SIGNAL_SERVER to the local docker websocket when this
       * page is served from a localhost / private-LAN host. Without
       * this, opening http://localhost:8080/signal.html stays in
       * singleplayer and the docker signal_server on :9091 is unused —
       * which means no global highscore broadcast reaches the client.
       * Production sets window.SIGNAL_SERVER explicitly before this
       * script runs, so this default never fires there. */
      var signalParams = new URLSearchParams(window.location.search);
      if (!signalParams.has('singleplayer') && !window.SIGNAL_SERVER) {
        var h = window.location.hostname;
        var isLocal = (h === 'localhost' || h === '127.0.0.1' || h === '0.0.0.0'
                    || /^192\.168\./.test(h) || /^10\./.test(h)
                    || /^172\.(1[6-9]|2[0-9]|3[01])\./.test(h));
        if (isLocal) window.SIGNAL_SERVER = 'ws://' + h + ':9091/ws';
      }
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
