<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Permissions-Policy" content="cross-origin-isolated=(self)">
    <title>Signal</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        background:
          radial-gradient(circle at top, rgba(40, 70, 120, 0.25), transparent 40%),
          linear-gradient(180deg, #09111f 0%, #04070c 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        overflow: hidden;
        color: #dce9ff;
      }

      .shell {
        width: 100vw;
        height: 100dvh;
      }

      .hero {
        display: none;
      }

      .hero-copy {
        display: none;
      }

      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(150, 198, 255, 0.74);
      }

      .title {
        font-size: clamp(20px, 2.8vw, 34px);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .subtitle {
        font-size: 13px;
        color: rgba(220, 233, 255, 0.72);
      }

      .frame {
        width: 100vw;
        height: 100dvh;
        overflow: hidden;
        background: transparent;
        position: relative;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
      }

      @media (max-width: 760px), (max-height: 680px) {
        .hero {
          display: none;
        }
      }

      /* Voice connect button — small floating chip in the top-right.
       * Hidden once voicebox is connected and Kokoro is warm. */
      #voice-chip {
        position: fixed;
        top: 10px;
        right: 12px;
        z-index: 10;
        font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.04em;
        padding: 5px 10px;
        border-radius: 99px;
        border: 1px solid rgba(150, 198, 255, 0.35);
        background: rgba(15, 25, 40, 0.78);
        color: rgba(220, 233, 255, 0.92);
        cursor: pointer;
        backdrop-filter: blur(6px);
        transition: opacity .25s, background .15s;
      }
      #voice-chip:hover { background: rgba(35, 55, 80, 0.88); }
      #voice-chip.ok    { border-color: rgba(124, 245, 152, 0.45); color: rgba(170, 240, 180, 0.92); }
      #voice-chip.warn  { border-color: rgba(250, 166, 92, 0.45);  color: rgba(255, 200, 130, 0.92); }
      #voice-chip.err   { border-color: rgba(255, 110, 110, 0.45); color: rgba(255, 170, 170, 0.92); }
      #voice-chip.fade  { opacity: 0.35; }
      #voice-chip.fade:hover { opacity: 1; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="hero">
        <div class="hero-copy">
          <div class="eyebrow">Industrial Frontier</div>
          <div class="title">Signal</div>
          <div class="subtitle">Keep the belt connected.</div>
        </div>
      </div>
      <div class="frame">
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
      </div>
    </div>
    <button id="voice-chip" type="button" title="Connect OpenRouter to enable AI voice">connect voice</button>
    <script type="module" src="voicebox.js"></script>
    <script>
      // Voice chip: drives the OAuth + status display. Polls window.voicebox
      // (loaded above) and updates label as state transitions: idle → connecting
      // → connected → voice-warm. Click to start OAuth or to disconnect.
      (function () {
        var chip = document.getElementById('voice-chip');
        if (!chip) return;
        function set(text, cls) {
          chip.textContent = text;
          chip.className = cls || '';
        }
        function tick() {
          var vb = window.voicebox;
          if (!vb || !vb.isConnected) {
            set('connect voice');
            return;
          }
          if (vb.isConnected()) {
            if (vb.isTTSReady && vb.isTTSReady()) {
              set('voice ✓', 'ok fade');
            } else {
              set('loading kokoro…', 'warn');
            }
          } else {
            set('connect voice');
          }
        }
        chip.addEventListener('click', function () {
          var vb = window.voicebox;
          if (!vb) return;
          if (vb.isConnected && vb.isConnected()) {
            if (confirm('Disconnect OpenRouter and clear cached key?')) {
              vb.disconnect();
              tick();
            }
          } else {
            set('redirecting…', 'warn');
            try { vb.connect(); }
            catch (e) { set('error', 'err'); console.error(e); }
          }
        });
        // Poll periodically to reflect lazy state changes (TTS warmup,
        // OAuth-callback completion).
        setInterval(tick, 1000);
        tick();
      })();
    </script>
    <script>
      var Module = {
        canvas: document.getElementById("canvas"),
        print: function (text) {
          console.log(text);
        },
        printErr: function (text) {
          console.error(text);
        }
      };

      /* Default SIGNAL_SERVER to the local docker websocket when this
       * page is served from a localhost / private-LAN host. Without
       * this, opening http://localhost:8080/signal.html stays in
       * singleplayer and the docker signal_server on :9091 is unused —
       * which means no global highscore broadcast reaches the client.
       * Production sets window.SIGNAL_SERVER explicitly before this
       * script runs, so this default never fires there. */
      if (!window.SIGNAL_SERVER) {
        var h = window.location.hostname;
        var isLocal = (h === 'localhost' || h === '127.0.0.1' || h === '0.0.0.0'
                    || /^192\.168\./.test(h) || /^10\./.test(h)
                    || /^172\.(1[6-9]|2[0-9]|3[01])\./.test(h));
        if (isLocal) window.SIGNAL_SERVER = 'ws://' + h + ':9091/ws';
      }
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
