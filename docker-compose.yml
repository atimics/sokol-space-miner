# Run both server and static-client in one container, ports bound to host.
#
#   docker-compose up --build        # first time / after code changes
#   docker-compose up -d              # detached
#   docker-compose down               # stop
#
# Browser: http://localhost:8080/signal.html?server=ws://localhost:9091/ws
# (Or set window.SIGNAL_SERVER in play.html for a fixed default.)
services:
  signal:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pass host's short HEAD into the image so the wasm + server both
        # bake in the matching version stamp. Falls back to "local" when
        # the env var isn't set (e.g. plain `docker compose build`).
        GIT_HASH: ${GIT_HASH:-local}
    image: signal:local
    container_name: signal
    ports:
      - "8080:8080"   # static HTTP — serves build-web/ (browser client)
      - "9091:9091"   # signal_server websocket + health endpoint
    volumes:
      - ./data:/app/data
      # Bind-mount the local wasm bundle so `cmake --build build-web` is
      # picked up by the running container without a `docker compose
      # --build` (which recreates the container and occasionally
      # corrupts podman's storage layer on macOS).
      - ./build-web:/app/build-web
      # Bind-mount a host-built signal_server binary. When present
      # (built by `scripts/local-build-server.sh`), the entrypoint
      # launches this one instead of the image-baked binary at
      # /app/signal_server. Makes server-side iteration as fast as
      # the wasm side (5-15s incremental) and keeps GIT_HASH in
      # lock-step with the actual repo HEAD, which is what the HUD's
      # syncing check depends on.
      - ./build-server-bin:/app/srv-local
    environment:
      - PORT=9091
      # - SIGNAL_API_TOKEN=devtoken  # set to enable the REST API surface
    restart: unless-stopped
