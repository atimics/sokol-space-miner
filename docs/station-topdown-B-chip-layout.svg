<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Top-Down Concept B: Chip Layout</title>
  <desc>Station as circuit board / microchip seen from above. Modules are functional blocks connected by trace-like corridors. Solar surface is the substrate. Clean, geometric, technical.</desc>

  <defs>
    <radialGradient id="ambientB" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFE8B0" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#886644" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#0a0808" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="800" fill="#0a0808"/>
  <circle cx="400" cy="400" r="420" fill="url(#ambientB)"/>

  <text x="400" y="28" text-anchor="middle" fill="#88CCAA" font-family="monospace" font-size="13" opacity="0.8">TOP-DOWN B: CHIP LAYOUT</text>
  <text x="400" y="46" text-anchor="middle" fill="#667766" font-family="monospace" font-size="10">Station as circuit board. Traces connect functional blocks. Solar substrate. Technical precision.</text>

  <g transform="translate(400, 400)">

    <!-- ============================================ -->
    <!-- SUBSTRATE (continuous solar surface) -->
    <!-- The whole station footprint is one solar collector -->
    <!-- ============================================ -->

    <!-- Ring 1 substrate disc -->
    <circle cx="0" cy="0" r="130" fill="#111e18" stroke="#88CCAA" stroke-opacity="0.12" stroke-width="0.8"/>
    <!-- Substrate grid pattern (solar cell lines) -->
    <g stroke="#88CCAA" stroke-opacity="0.04" stroke-width="0.3">
      <line x1="-130" y1="-60" x2="130" y2="-60"/>
      <line x1="-130" y1="-30" x2="130" y2="-30"/>
      <line x1="-130" y1="0" x2="130" y2="0"/>
      <line x1="-130" y1="30" x2="130" y2="30"/>
      <line x1="-130" y1="60" x2="130" y2="60"/>
      <line x1="-60" y1="-130" x2="-60" y2="130"/>
      <line x1="-30" y1="-130" x2="-30" y2="130"/>
      <line x1="0" y1="-130" x2="0" y2="130"/>
      <line x1="30" y1="-130" x2="30" y2="130"/>
      <line x1="60" y1="-130" x2="60" y2="130"/>
    </g>

    <!-- Ring 2 substrate extensions (rectangular wings) -->
    <rect x="-220" y="-28" width="100" height="56" fill="#0f1a14" stroke="#88CCAA" stroke-opacity="0.08" stroke-width="0.5"/>
    <rect x="120" y="-28" width="100" height="56" fill="#0f1a14" stroke="#88CCAA" stroke-opacity="0.08" stroke-width="0.5"/>
    <rect x="-40" y="120" width="80" height="80" fill="#0f1a14" stroke="#88CCAA" stroke-opacity="0.08" stroke-width="0.5"/>
    <rect x="-40" y="-200" width="80" height="80" fill="#0f1a14" stroke="#88CCAA" stroke-opacity="0.08" stroke-width="0.5"/>
    <!-- Wing grid lines -->
    <g stroke="#88CCAA" stroke-opacity="0.03" stroke-width="0.3">
      <line x1="-220" y1="0" x2="-120" y2="0"/>
      <line x1="-170" y1="-28" x2="-170" y2="28"/>
      <line x1="120" y1="0" x2="220" y2="0"/>
      <line x1="170" y1="-28" x2="170" y2="28"/>
      <line x1="0" y1="120" x2="0" y2="200"/>
      <line x1="-40" y1="160" x2="40" y2="160"/>
      <line x1="0" y1="-200" x2="0" y2="-120"/>
      <line x1="-40" y1="-160" x2="40" y2="-160"/>
    </g>

    <!-- ============================================ -->
    <!-- CIRCUIT TRACES (corridors as PCB traces) -->
    <!-- ============================================ -->
    <g stroke="#88CCAA" stroke-opacity="0.18" stroke-width="3" fill="none">
      <!-- Core to modules (straight traces, right-angle routing) -->
      <polyline points="0,0 0,-100"/>
      <polyline points="0,0 87,50"/>
      <polyline points="0,0 -87,50"/>
      <!-- Ring 1 to Ring 2 traces -->
      <polyline points="0,-100 0,-160"/>
      <polyline points="87,50 120,50 170,0"/>
      <polyline points="-87,50 -120,50 -170,0"/>
      <polyline points="87,50 60,80 0,160"/>
    </g>
    <!-- Trace edge highlights -->
    <g stroke="#88CCAA" stroke-opacity="0.06" stroke-width="6" fill="none">
      <polyline points="0,0 0,-100"/>
      <polyline points="0,0 87,50"/>
      <polyline points="0,0 -87,50"/>
    </g>

    <!-- ============================================ -->
    <!-- CORE: CPU die -->
    <!-- ============================================ -->
    <rect x="-20" y="-20" width="40" height="40" fill="#162420" stroke="#88CCAA" stroke-opacity="0.4" stroke-width="1.2"/>
    <!-- Die markings -->
    <rect x="-14" y="-14" width="28" height="28" fill="none" stroke="#88CCAA" stroke-opacity="0.15" stroke-width="0.5"/>
    <rect x="-8" y="-8" width="16" height="16" fill="#1a2e24" stroke="#88CCAA" stroke-opacity="0.2" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="3" fill="#88CCAA" opacity="0.5"/>
    <!-- Pin pads (connection points to traces) -->
    <rect x="-3" y="-24" width="6" height="5" fill="#2a4a38" stroke="#88CCAA" stroke-opacity="0.3" stroke-width="0.3"/>
    <rect x="18" y="8" width="5" height="6" fill="#2a4a38" stroke="#88CCAA" stroke-opacity="0.3" stroke-width="0.3"/>
    <rect x="-23" y="8" width="5" height="6" fill="#2a4a38" stroke="#88CCAA" stroke-opacity="0.3" stroke-width="0.3"/>

    <!-- ============================================ -->
    <!-- RING 1: Signal Relay (12 o'clock) — radio chip -->
    <!-- ============================================ -->
    <g transform="translate(0, -100)">
      <rect x="-24" y="-18" width="48" height="36" fill="#1a2e24" stroke="#88CCAA" stroke-opacity="0.35" stroke-width="1"/>
      <!-- IC markings -->
      <circle cx="-16" cy="-10" r="2" fill="#88CCAA" opacity="0.15"/>
      <text x="0" y="2" text-anchor="middle" fill="#88CCAA" font-family="monospace" font-size="7" opacity="0.25">SIG</text>
      <!-- Pin pads -->
      <rect x="-18" y="-22" width="4" height="4" fill="#2a4a38" stroke="#88CCAA" stroke-opacity="0.2" stroke-width="0.3"/>
      <rect x="-6" y="-22" width="4" height="4" fill="#2a4a38" stroke="#88CCAA" stroke-opacity="0.2" stroke-width="0.3"/>
      <rect x="6" y="-22" width="4" height="4" fill="#2a4a38" stroke="#88CCAA" stroke-opacity="0.2" stroke-width="0.3"/>
      <rect x="14" y="-22" width="4" height="4" fill="#2a4a38" stroke="#88CCAA" stroke-opacity="0.2" stroke-width="0.3"/>
      <!-- Broadcast pattern (concentric from chip) -->
      <circle cx="0" cy="0" r="30" fill="none" stroke="#88CCAA" stroke-opacity="0.08" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="44" fill="none" stroke="#88CCAA" stroke-opacity="0.05" stroke-width="0.5"/>
    </g>

    <!-- ============================================ -->
    <!-- RING 1: Furnace (5 o'clock) — power regulator -->
    <!-- ============================================ -->
    <g transform="translate(87, 50)">
      <rect x="-22" y="-16" width="44" height="32" fill="#1a2418" stroke="#B8CC72" stroke-opacity="0.3" stroke-width="1"/>
      <!-- Heat sink fins (radiating lines — seen from above) -->
      <g stroke="#B8CC72" stroke-opacity="0.15" stroke-width="0.8">
        <line x1="-22" y1="-12" x2="-30" y2="-12"/>
        <line x1="-22" y1="-6" x2="-30" y2="-6"/>
        <line x1="-22" y1="0" x2="-30" y2="0"/>
        <line x1="-22" y1="6" x2="-30" y2="6"/>
        <line x1="-22" y1="12" x2="-30" y2="12"/>
        <line x1="22" y1="-12" x2="30" y2="-12"/>
        <line x1="22" y1="-6" x2="30" y2="-6"/>
        <line x1="22" y1="0" x2="30" y2="0"/>
        <line x1="22" y1="6" x2="30" y2="6"/>
        <line x1="22" y1="12" x2="30" y2="12"/>
      </g>
      <!-- Thermal glow -->
      <circle cx="0" cy="0" r="8" fill="#B8CC72" opacity="0.06"/>
      <circle cx="0" cy="0" r="4" fill="#CCAA44" opacity="0.12"/>
      <circle cx="0" cy="0" r="2" fill="#FFCC66" opacity="0.2"/>
      <text x="0" y="3" text-anchor="middle" fill="#B8CC72" font-family="monospace" font-size="6" opacity="0.2">FRN</text>
    </g>

    <!-- ============================================ -->
    <!-- RING 1: Dock (7 o'clock) — connector port -->
    <!-- ============================================ -->
    <g transform="translate(-87, 50)">
      <rect x="-24" y="-18" width="48" height="36" fill="#142018" stroke="#88CCAA" stroke-opacity="0.3" stroke-width="1"/>
      <!-- Connector cavity -->
      <rect x="-14" y="-8" width="28" height="24" fill="#060a08" stroke="#88CCAA" stroke-opacity="0.15" stroke-width="0.5"/>
      <!-- Contact pins inside cavity -->
      <rect x="-10" y="0" width="3" height="12" fill="#2a4a38" stroke="#88CCAA" stroke-opacity="0.25" stroke-width="0.3"/>
      <rect x="-3" y="0" width="3" height="12" fill="#2a4a38" stroke="#88CCAA" stroke-opacity="0.25" stroke-width="0.3"/>
      <rect x="4" y="0" width="3" height="12" fill="#2a4a38" stroke="#88CCAA" stroke-opacity="0.25" stroke-width="0.3"/>
      <!-- Guide notches -->
      <rect x="-16" y="4" width="3" height="8" fill="#1a2a22"/>
      <rect x="13" y="4" width="3" height="8" fill="#1a2a22"/>
      <text x="0" y="-4" text-anchor="middle" fill="#88CCAA" font-family="monospace" font-size="6" opacity="0.2">DCK</text>
    </g>

    <!-- ============================================ -->
    <!-- RING 2: Ore Buyer (2 o'clock) -->
    <!-- ============================================ -->
    <g transform="translate(170, 0)">
      <rect x="-22" y="-20" width="44" height="40" fill="#161e14" stroke="#B8CC72" stroke-opacity="0.25" stroke-width="0.8"/>
      <!-- Intake funnel (top-down: concentric squares) -->
      <rect x="-12" y="-12" width="24" height="24" fill="#0a0e08" stroke="#B8CC72" stroke-opacity="0.15" stroke-width="0.3"/>
      <rect x="-6" y="-6" width="12" height="12" fill="#060a06" stroke="#B8CC72" stroke-opacity="0.1" stroke-width="0.3"/>
      <rect x="-2" y="-2" width="4" height="4" fill="#B8CC72" opacity="0.08"/>
      <text x="0" y="16" text-anchor="middle" fill="#B8CC72" font-family="monospace" font-size="5" opacity="0.2">ORE</text>
    </g>

    <!-- ============================================ -->
    <!-- RING 2: Frame Press (10 o'clock) -->
    <!-- ============================================ -->
    <g transform="translate(-170, 0)">
      <rect x="-24" y="-20" width="48" height="40" fill="#1a2010" stroke="#CCAA44" stroke-opacity="0.25" stroke-width="0.8"/>
      <!-- Press plates (top-down: overlapping rectangles) -->
      <rect x="-14" y="-14" width="28" height="28" fill="#1e2814" stroke="#CCAA44" stroke-opacity="0.15" stroke-width="0.5"/>
      <rect x="-8" y="-8" width="16" height="16" fill="#222e18" stroke="#CCAA44" stroke-opacity="0.2" stroke-width="0.3"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#CCAA44" stroke-opacity="0.35" stroke-width="0.5"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#CCAA44" stroke-opacity="0.35" stroke-width="0.5"/>
      <text x="0" y="-16" text-anchor="middle" fill="#CCAA44" font-family="monospace" font-size="5" opacity="0.2">FRM</text>
    </g>

    <!-- ============================================ -->
    <!-- RING 2: Repair Bay (6 o'clock) -->
    <!-- ============================================ -->
    <g transform="translate(0, 160)">
      <rect x="-22" y="-18" width="44" height="36" fill="#141a1a" stroke="#88AAAA" stroke-opacity="0.25" stroke-width="0.8"/>
      <!-- Robotic arm (top-down: pivot + reach) -->
      <circle cx="0" cy="0" r="10" fill="#0e1414" stroke="#88AAAA" stroke-opacity="0.15" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="3" fill="#88AAAA" opacity="0.15"/>
      <line x1="3" y1="0" x2="12" y2="-8" stroke="#88AAAA" stroke-opacity="0.3" stroke-width="0.8"/>
      <circle cx="12" cy="-8" r="2" fill="#88AAAA" opacity="0.2"/>
      <text x="0" y="14" text-anchor="middle" fill="#88AAAA" font-family="monospace" font-size="5" opacity="0.2">RPR</text>
    </g>

    <!-- ============================================ -->
    <!-- RING 2: Shipyard (4 o'clock) -->
    <!-- ============================================ -->
    <g transform="translate(100, 130)">
      <rect x="-26" y="-22" width="52" height="44" fill="#161a10" stroke="#CCAA44" stroke-opacity="0.22" stroke-width="0.8"/>
      <!-- Scaffold frame (top-down) -->
      <rect x="-18" y="-16" width="36" height="32" fill="none" stroke="#CCAA44" stroke-opacity="0.15" stroke-width="0.5"/>
      <!-- Cross bracing -->
      <line x1="-18" y1="-16" x2="18" y2="16" stroke="#CCAA44" stroke-opacity="0.1" stroke-width="0.3"/>
      <line x1="18" y1="-16" x2="-18" y2="16" stroke="#CCAA44" stroke-opacity="0.1" stroke-width="0.3"/>
      <!-- Crane pivot -->
      <circle cx="10" cy="-10" r="3" fill="#CCAA44" opacity="0.1"/>
      <line x1="10" y1="-10" x2="-4" y2="4" stroke="#CCAA44" stroke-opacity="0.2" stroke-width="0.5"/>
    </g>

  </g>

  <text x="400" y="750" text-anchor="middle" fill="#667766" font-family="monospace" font-size="11">Station IS a circuit board. Solar substrate covers everything. Modules are IC packages.</text>
  <text x="400" y="768" text-anchor="middle" fill="#667766" font-family="monospace" font-size="11">Corridors are PCB traces. Heat sinks on furnace. Connector port for dock. Very electric-civ.</text>
  <text x="400" y="786" text-anchor="middle" fill="#555555" font-family="monospace" font-size="10">Substrate extends as rectangular wings for Ring 2+. Strong faction identity.</text>
</svg>