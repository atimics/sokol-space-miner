<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <title>Station Concept D: Signal Bloom</title>
  <desc>Organic/crystalline structure. Station grows like a flower toward the star. Solar petals unfurl sunward. Modules are nodes in a branching structure, not slots on a ring. Emphasizes the station as a living signal organism.</desc>

  <defs>
    <radialGradient id="starGlowD" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FFE4A0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1a0a00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="signalField" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#88CCAA" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#88CCAA" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#88CCAA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="800" fill="#0a0808"/>
  <rect width="800" height="400" fill="url(#starGlowD)"/>

  <text x="400" y="30" text-anchor="middle" fill="#88CCAA" font-family="monospace" font-size="14" opacity="0.8">CONCEPT D: SIGNAL BLOOM</text>
  <text x="400" y="50" text-anchor="middle" fill="#667766" font-family="monospace" font-size="11">Organic branching toward star. Solar petals. Station as signal organism. Asymmetric growth.</text>
  <text x="400" y="80" text-anchor="middle" fill="#FFE4A0" font-family="monospace" font-size="10" opacity="0.5">^ STARWARD</text>

  <g transform="translate(400, 430)">

    <!-- Signal field glow -->
    <circle cx="0" cy="0" r="200" fill="url(#signalField)"/>

    <!-- Faint signal ripples emanating outward -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#88CCAA" stroke-opacity="0.04" stroke-width="1"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#88CCAA" stroke-opacity="0.03" stroke-width="1"/>
    <circle cx="0" cy="0" r="260" fill="none" stroke="#88CCAA" stroke-opacity="0.02" stroke-width="1"/>

    <!-- ============================================ -->
    <!-- CORE SEED - the origin node -->
    <!-- ============================================ -->
    <circle cx="0" cy="0" r="18" fill="#152820" stroke="#88CCAA" stroke-opacity="0.4" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="10" fill="#1a3028" stroke="#88CCAA" stroke-opacity="0.25" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="4" fill="#88CCAA" opacity="0.5"/>

    <!-- ============================================ -->
    <!-- BRANCHING STEMS (not rings — organic paths) -->
    <!-- ============================================ -->

    <!-- Main stem sunward (thickest — primary growth axis) -->
    <path d="M 0,-18 C 0,-40 -5,-60 0,-100" fill="none" stroke="#88CCAA" stroke-opacity="0.3" stroke-width="3"/>
    <path d="M 0,-100 C 5,-130 -5,-150 0,-170" fill="none" stroke="#88CCAA" stroke-opacity="0.2" stroke-width="2"/>

    <!-- Left branch -->
    <path d="M -15,-10 C -40,-20 -55,-15 -80,-30" fill="none" stroke="#88CCAA" stroke-opacity="0.25" stroke-width="2.5"/>
    <path d="M -80,-30 C -100,-40 -110,-60 -130,-90" fill="none" stroke="#88CCAA" stroke-opacity="0.18" stroke-width="1.5"/>

    <!-- Right branch -->
    <path d="M 15,-10 C 40,-25 60,-20 90,-40" fill="none" stroke="#88CCAA" stroke-opacity="0.25" stroke-width="2.5"/>
    <path d="M 90,-40 C 110,-50 120,-70 140,-100" fill="none" stroke="#88CCAA" stroke-opacity="0.18" stroke-width="1.5"/>

    <!-- Darkward root (dock/intake) -->
    <path d="M 0,18 C 0,40 -5,50 0,80" fill="none" stroke="#88CCAA" stroke-opacity="0.2" stroke-width="2"/>

    <!-- Left darkward root -->
    <path d="M -12,14 C -30,30 -40,40 -60,70" fill="none" stroke="#88CCAA" stroke-opacity="0.15" stroke-width="1.5"/>

    <!-- Right darkward root -->
    <path d="M 12,14 C 30,35 45,45 65,75" fill="none" stroke="#88CCAA" stroke-opacity="0.15" stroke-width="1.5"/>

    <!-- ============================================ -->
    <!-- SOLAR PETALS (sunward terminus of each branch) -->
    <!-- ============================================ -->

    <!-- Central petal (top of main stem) -->
    <g transform="translate(0, -175)">
      <!-- Petal shape — elongated diamond -->
      <polygon points="0,-40 -22,-8 -18,20 0,28 18,20 22,-8"
               fill="#1a2820" stroke="#88CCAA" stroke-opacity="0.35" stroke-width="1"/>
      <!-- Panel veins -->
      <line x1="0" y1="-40" x2="0" y2="28" stroke="#88CCAA" stroke-opacity="0.2" stroke-width="0.5"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="#88CCAA" stroke-opacity="0.15" stroke-width="0.5"/>
      <line x1="-20" y1="-4" x2="0" y2="-40" stroke="#88CCAA" stroke-opacity="0.1" stroke-width="0.5"/>
      <line x1="20" y1="-4" x2="0" y2="-40" stroke="#88CCAA" stroke-opacity="0.1" stroke-width="0.5"/>
      <line x1="-16" y1="10" x2="16" y2="10" stroke="#88CCAA" stroke-opacity="0.1" stroke-width="0.5"/>
      <!-- Subtle glow -->
      <polygon points="0,-40 -22,-8 -18,20 0,28 18,20 22,-8" fill="#88CCAA" opacity="0.04"/>
    </g>

    <!-- Left petal -->
    <g transform="translate(-135, -95) rotate(30)">
      <polygon points="0,-32 -18,-6 -14,16 0,22 14,16 18,-6"
               fill="#1a2820" stroke="#88CCAA" stroke-opacity="0.3" stroke-width="0.8"/>
      <line x1="0" y1="-32" x2="0" y2="22" stroke="#88CCAA" stroke-opacity="0.15" stroke-width="0.5"/>
      <line x1="-14" y1="0" x2="14" y2="0" stroke="#88CCAA" stroke-opacity="0.1" stroke-width="0.5"/>
      <polygon points="0,-32 -18,-6 -14,16 0,22 14,16 18,-6" fill="#88CCAA" opacity="0.03"/>
    </g>

    <!-- Right petal -->
    <g transform="translate(145, -105) rotate(-35)">
      <polygon points="0,-35 -20,-7 -16,18 0,24 16,18 20,-7"
               fill="#1a2820" stroke="#88CCAA" stroke-opacity="0.3" stroke-width="0.8"/>
      <line x1="0" y1="-35" x2="0" y2="24" stroke="#88CCAA" stroke-opacity="0.15" stroke-width="0.5"/>
      <line x1="-16" y1="0" x2="16" y2="0" stroke="#88CCAA" stroke-opacity="0.1" stroke-width="0.5"/>
      <polygon points="0,-35 -20,-7 -16,18 0,24 16,18 20,-7" fill="#88CCAA" opacity="0.03"/>
    </g>

    <!-- ============================================ -->
    <!-- MODULE NODES (along branches) -->
    <!-- ============================================ -->

    <!-- Signal Relay node (main stem, mid-height) -->
    <g transform="translate(0, -100)">
      <circle cx="0" cy="0" r="14" fill="#152820" stroke="#88CCAA" stroke-opacity="0.35" stroke-width="1"/>
      <circle cx="0" cy="0" r="7" fill="#1a3028" stroke="#88CCAA" stroke-opacity="0.2" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="3" fill="#88CCAA" opacity="0.5"/>
      <!-- Tiny signal arcs -->
      <path d="M -8,-16 A 10,10 0 0,1 8,-16" fill="none" stroke="#88CCAA" stroke-opacity="0.25" stroke-width="0.5"/>
      <path d="M -14,-22 A 16,16 0 0,1 14,-22" fill="none" stroke="#88CCAA" stroke-opacity="0.15" stroke-width="0.5"/>
    </g>

    <!-- Furnace node (left branch) -->
    <g transform="translate(-80, -30)">
      <circle cx="0" cy="0" r="16" fill="#1a2218" stroke="#B8CC72" stroke-opacity="0.35" stroke-width="1"/>
      <!-- Inner glow -->
      <circle cx="0" cy="0" r="10" fill="#B8CC72" opacity="0.06"/>
      <circle cx="0" cy="0" r="5" fill="#CCAA44" opacity="0.12"/>
      <circle cx="0" cy="0" r="2" fill="#FFCC66" opacity="0.25"/>
      <!-- Heat radiators (darkward tendrils) -->
      <line x1="-10" y1="14" x2="-16" y2="30" stroke="#B8CC72" stroke-opacity="0.2" stroke-width="1"/>
      <line x1="0" y1="16" x2="0" y2="28" stroke="#B8CC72" stroke-opacity="0.15" stroke-width="0.5"/>
      <line x1="10" y1="14" x2="16" y2="28" stroke="#B8CC72" stroke-opacity="0.2" stroke-width="1"/>
    </g>

    <!-- Frame Press node (right branch) -->
    <g transform="translate(90, -40)">
      <rect x="-16" y="-14" width="32" height="28" rx="4" fill="#2a2410" stroke="#CCAA44" stroke-opacity="0.3" stroke-width="1"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#CCAA44" stroke-opacity="0.4" stroke-width="0.5"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#CCAA44" stroke-opacity="0.4" stroke-width="0.5"/>
    </g>

    <!-- Dock node (darkward — the root, the mouth) -->
    <g transform="translate(0, 80)">
      <rect x="-22" y="-10" width="44" height="6" fill="#1a2a22" stroke="#88CCAA" stroke-opacity="0.35" stroke-width="1"/>
      <rect x="-22" y="-10" width="6" height="36" fill="#2a3a32" stroke="#88CCAA" stroke-opacity="0.25" stroke-width="0.5"/>
      <rect x="16" y="-10" width="6" height="36" fill="#2a3a32" stroke="#88CCAA" stroke-opacity="0.25" stroke-width="0.5"/>
      <circle cx="-12" cy="10" r="2.5" fill="#88CCAA" opacity="0.5"/>
      <circle cx="12" cy="10" r="2.5" fill="#88CCAA" opacity="0.5"/>
      <!-- Approach guide -->
      <line x1="-12" y1="26" x2="-12" y2="50" stroke="#88CCAA" stroke-opacity="0.1" stroke-dasharray="3,3" stroke-width="0.5"/>
      <line x1="12" y1="26" x2="12" y2="50" stroke="#88CCAA" stroke-opacity="0.1" stroke-dasharray="3,3" stroke-width="0.5"/>
    </g>

    <!-- Ore Buyer (left darkward root) -->
    <g transform="translate(-60, 70)">
      <polygon points="0,-16 -18,2 -12,18 12,18 18,2" fill="#1a2218" stroke="#B8CC72" stroke-opacity="0.3" stroke-width="0.8"/>
      <rect x="-6" y="2" width="12" height="14" fill="#0a0a08" opacity="0.4"/>
    </g>

    <!-- Repair Bay (right darkward root) -->
    <g transform="translate(65, 75)">
      <circle cx="0" cy="0" r="14" fill="#1a2222" stroke="#88AAAA" stroke-opacity="0.3" stroke-width="0.8"/>
      <line x1="-6" y1="-6" x2="6" y2="6" stroke="#88AAAA" stroke-opacity="0.4" stroke-width="1"/>
      <circle cx="-7" cy="-7" r="4" fill="none" stroke="#88AAAA" stroke-opacity="0.25" stroke-width="0.5"/>
    </g>

    <!-- ============================================ -->
    <!-- SECONDARY GROWTH BUDS (empty slots for future modules) -->
    <!-- ============================================ -->
    <circle cx="-130" cy="-90" r="6" fill="none" stroke="#88CCAA" stroke-opacity="0.1" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="140" cy="-100" r="6" fill="none" stroke="#88CCAA" stroke-opacity="0.1" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="-90" cy="80" r="5" fill="none" stroke="#88CCAA" stroke-opacity="0.08" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="95" cy="85" r="5" fill="none" stroke="#88CCAA" stroke-opacity="0.08" stroke-width="0.5" stroke-dasharray="2,2"/>

  </g>

  <text x="400" y="700" text-anchor="middle" fill="#667766" font-family="monospace" font-size="11">KEY IDEAS: Station grows like a plant toward the star. Solar petals at branch tips.</text>
  <text x="400" y="715" text-anchor="middle" fill="#667766" font-family="monospace" font-size="11">Modules are nodes on organic branches, not slots on rings. Asymmetric, alive.</text>
  <text x="400" y="730" text-anchor="middle" fill="#667766" font-family="monospace" font-size="11">Industrial roots face darkward. Empty growth buds show where new modules could go.</text>
  <text x="400" y="750" text-anchor="middle" fill="#555555" font-family="monospace" font-size="10">NOTE: Most radical departure — would require replacing ring/slot with branch/node system.</text>
  <text x="400" y="770" text-anchor="middle" fill="#555555" font-family="monospace" font-size="10">DARKWARD v</text>
</svg>