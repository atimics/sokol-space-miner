name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  # Per-ref so PR runs don't cancel each other. Multiple PRs were colliding
  # on a shared "deploy" group, killing tests mid-flight. The deploy job
  # further down still only fires on main, so deploys remain serialized.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast gate: build once, run tests with -Werror.
  # On failure, cancels the whole run so siblings (native matrix,
  # static analysis, CRAP, docker push) don't keep burning minutes.
  test-basic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build and run tests
        run: |
          cmake -S . -B build-test -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON \
            -DCMAKE_C_FLAGS="-Werror" -DCMAKE_C_FLAGS_DEBUG="-O2 -g"
          cmake --build build-test --parallel
          ulimit -s 16384
          ./build-test/signal_test
      - name: Cancel sibling jobs on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }} || true

  # ASan: post-deploy verification on main only. Same logic as
  # test-valgrind — runs ~7-10 min and was the longest pole on PR
  # turnaround. test-basic + native (linux/macos/windows) catch the
  # vast majority of regressions on the PR loop in <5 min; asan
  # backstops them on main after deploy lands.
  test-asan:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build and run tests with AddressSanitizer
        run: |
          cmake -S . -B build-san -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
          cmake --build build-san
          ulimit -s 16384
          ./build-san/signal_test

  # Static analysis: parallel with tests.
  test-static:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install analysis tools
        run: sudo apt-get update && sudo apt-get install -y cppcheck clang-tools clang-tidy

      - name: cppcheck
        run: |
          cppcheck --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress='*:src/pl_mpeg.h' \
            --suppress='*:src/minimp3.h' \
            --suppress='*:src/stb_image.h' \
            -I shared/ -I src/ -I server/ \
            src/*.c server/game_sim.c server/sim_nav.c server/sim_autopilot.c server/sim_ai.c server/sim_save.c 2>&1

      - name: Clang static analyzer (scan-build)
        run: |
          cmake -S . -B build-scan -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON
          scan-build --status-bugs cmake --build build-scan

      - name: clang-tidy
        run: |
          cmake -S . -B build-tidy -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          clang-tidy -p build-tidy \
            server/game_sim.c server/sim_nav.c server/sim_autopilot.c \
            server/sim_ai.c server/sim_save.c server/sim_construction.c \
            2>&1 | tee clang-tidy-output.txt
          if grep -q "error:" clang-tidy-output.txt; then exit 1; fi

  # Valgrind: slowest sweep, ~30 min. Runs on main only AND only after
  # deploy succeeds — it's a post-deploy verification, not a gate. The
  # PR loop relies on test-asan for fast definite-leak detection;
  # valgrind catches the deeper memcheck issues asan doesn't, but
  # blocking deploy on it would add 30 min to every prod release.
  # Failure here surfaces as a red post-deploy check (paging signal),
  # not a deploy block.
  test-valgrind:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Valgrind memcheck
        run: |
          cmake -S . -B build-valgrind -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON
          cmake --build build-valgrind
          ulimit -s 16384
          valgrind --error-exitcode=1 \
            --leak-check=full \
            --show-leak-kinds=definite \
            --errors-for-leak-kinds=definite \
            --track-origins=yes \
            --main-stacksize=16777216 \
            ./build-valgrind/signal_test 2>&1 | tail -30

  # CRAP score (complexity * uncovered). Tested-code report GATES the
  # deploy at threshold 25 — the codebase already passes this, so the
  # gate engages only on new regressions. Client complexity budget is
  # informational only (signal_test does not link client code, so
  # coverage is structurally 0 and CRAP collapses to complexity).
  test-crap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install lizard + gcovr
        run: pip install --quiet lizard gcovr

      - name: Build signal_test with coverage
        run: |
          cmake -S . -B build-coverage -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS_ONLY=ON \
            -DCMAKE_C_FLAGS="--coverage -O0 -g" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          cmake --build build-coverage --target signal_test

      - name: Run tests (collect coverage)
        run: |
          ulimit -s 16384
          ./build-coverage/signal_test --quiet

      - name: Generate gcovr JSON
        run: |
          gcovr -r . --json coverage.json --gcov-ignore-parse-errors \
            --filter 'server/.*' --filter 'src/.*' --filter 'shared/.*' \
            --exclude 'server/mongoose\..*' \
            --exclude 'src/stb_image\.h' \
            --exclude 'src/pl_mpeg\.h' \
            --exclude 'src/minimp3\.h' \
            build-coverage

      # Sim code + pure helpers are the files signal_test actually links,
      # so coverage is meaningful and CRAP is actionable. --fail-on-exceed
      # gates the deploy: any function scoring >25 fails the job. Threshold
      # 25 is structurally equivalent to "no function with CCN >= 25, and
      # CCN 10-24 functions need real test coverage" — the floor of the
      # CRAP formula is `+ ccn`, so CCN >= 25 cannot score below 25 at any
      # coverage level. The codebase already passes; the gate engages on
      # new regressions only.
      - name: Compute CRAP (tested code) — GATING at threshold 25
        run: |
          python3 scripts/crap.py --coverage coverage.json \
            --paths server/game_sim.c server/sim_ai.c server/sim_autopilot.c \
                    server/sim_flight.c server/sim_nav.c server/sim_save.c \
                    server/sim_catalog.c server/sim_asteroid.c \
                    server/sim_physics.c server/sim_production.c \
                    server/sim_construction.c \
                    src/commodity.c src/manifest.c src/ship.c src/economy.c \
                    src/asteroid.c src/rng.c \
                    shared \
            --top 30 --threshold 25 --fail-on-exceed \
            --json-out crap-tested.json | tee crap-tested.txt

      # Client render/input/net + server entry point aren't linked into
      # signal_test. Coverage is always 0% here; treat as pure complexity.
      # Informational only — does not gate.
      - name: Complexity budget (untested code) — advisory
        if: always()
        run: |
          python3 scripts/crap.py --coverage coverage.json \
            --paths src/main.c src/hud.c src/input.c src/world_draw.c \
                    src/station_ui.c src/net.c src/net_sync.c src/audio.c \
                    src/client.h src/local_server.c \
                    server/main.c \
            --top 30 --threshold 30 \
            --json-out crap-client.json | tee crap-client.txt

      - name: Summarize in job summary
        if: always()
        run: |
          {
            echo "### CRAP — tested code (sim + helpers + shared)"
            echo ""
            echo 'Real CRAP: coverage is meaningful. Fix by lowering complexity _or_ raising coverage.'
            echo ''
            echo '```'
            cat crap-tested.txt
            echo '```'
            echo ""
            echo "### Complexity budget (client + server entry — not linked into signal_test)"
            echo ""
            echo 'Coverage always reads 0% here because signal_test does not link this code. Treat as a pure complexity report.'
            echo ''
            echo '```'
            cat crap-client.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CRAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crap-report
          path: |
            crap-tested.json
            crap-tested.txt
            crap-client.json
            crap-client.txt
            coverage.json

  # Client WASM build — parallel with tests.
  build-client:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.8

      - name: Build WASM
        id: build_wasm
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          echo "git_hash=$GIT_HASH" >> "$GITHUB_OUTPUT"
          emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release -DGIT_HASH=$GIT_HASH
          cmake --build build-web

      - name: Prepare artifacts
        env:
          GIT_HASH: ${{ steps.build_wasm.outputs.git_hash }}
        run: |
          mkdir -p _site/play _site/music _site/ost _site/docs
          mkdir -p "_site/play/v/$GIT_HASH"
          cp web/index.html _site/index.html
          cp web/play.html _site/play/index.html
          cp web/music.html _site/music/index.html
          cp web/music.html _site/ost/index.html
          cp build-web/signal.js _site/play/signal.js
          cp build-web/signal.wasm _site/play/signal.wasm
          # Version-pinned archive — bootstrap loads this when server
          # advertises an older hash, preventing wire-format desync.
          cp build-web/signal.js "_site/play/v/$GIT_HASH/signal.js"
          cp build-web/signal.wasm "_site/play/v/$GIT_HASH/signal.wasm"
          cp docs/*.svg _site/docs/ 2>/dev/null || true
          cp docs/*.png _site/docs/ 2>/dev/null || true
          sed -i 's|<head>|<head><script>window.SIGNAL_SERVER="wss://signal-ws.ratimics.com/ws";</script>|' _site/play/index.html

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-site
          path: _site/

  # Server Docker build — gated on test-basic so we don't push a
  # broken image to ECR (real cost: ECR storage + ECS rollover risk).
  # Multi-arch QEMU build is the longest pole at ~5 min on its own.
  build-server:
    runs-on: ubuntu-latest
    needs: test-basic
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::022118847419:role/github-actions-deploy
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute short hash
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: 022118847419.dkr.ecr.us-east-1.amazonaws.com/signal-relay:${{ steps.vars.outputs.short_sha }}
          build-args: GIT_HASH=${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy GATES ON ALL TESTS passing + both builds.
  deploy:
    runs-on: ubuntu-latest
    needs: [test-basic, test-crap, build-client, build-server]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::022118847419:role/github-actions-deploy
          aws-region: us-east-1

      - name: Download client artifact
        uses: actions/download-artifact@v4
        with:
          name: client-site
          path: _site/

      # --- Snapshot current state for rollback ---
      - name: Snapshot current client
        id: snapshot-client
        continue-on-error: true
        run: |
          aws s3 sync s3://signal-ratimics-client/ /tmp/rollback-client/ --quiet
          echo "has_snapshot=true" >> "$GITHUB_OUTPUT"

      - name: Snapshot current server task definition
        id: snapshot-server
        run: |
          CURRENT_TASK_DEF=$(aws ecs describe-services \
            --cluster default \
            --services signal-relay \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "task_def_arn=$CURRENT_TASK_DEF" >> "$GITHUB_OUTPUT"

      # --- Deploy both ---
      - name: Deploy client to S3
        run: |
          # Root assets: --delete strips anything removed from _site/ —
          # but we exclude the versioned archive so old pinned bundles
          # stay reachable when the server is still on their hash.
          aws s3 sync _site/ s3://signal-ratimics-client/ --delete --exclude "play/v/*"
          # Versioned bundles are additive — never delete prior versions.
          aws s3 sync _site/play/v/ s3://signal-ratimics-client/play/v/

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E32W3RMW5O86FJ --paths "/*"

      - name: Deploy server to ECS
        run: |
          set -euo pipefail
          IMAGE_REPO=022118847419.dkr.ecr.us-east-1.amazonaws.com/signal-relay
          IMAGE_TAG=${{ needs.build-server.outputs.image_tag }}
          ARM64_DIGEST=$(
            aws ecr batch-get-image \
              --repository-name signal-relay \
              --image-ids imageTag=$IMAGE_TAG \
              --accepted-media-types application/vnd.oci.image.index.v1+json \
              --query 'images[0].imageManifest' \
              --output text |
            jq -r '.manifests[] | select(.platform.architecture == "arm64" and .platform.os == "linux") | .digest'
          )
          aws ecs describe-task-definition \
            --task-definition signal-relay-server \
            --query 'taskDefinition' > taskdef.json
          jq --arg image "${IMAGE_REPO}@${ARM64_DIGEST}" '
            .containerDefinitions[0].image = $image |
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
          ' taskdef.json > taskdef-deploy.json
          TASK_DEF_ARN=$(
            aws ecs register-task-definition \
              --cli-input-json file://taskdef-deploy.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )
          aws ecs update-service \
            --cluster default \
            --service signal-relay \
            --task-definition "$TASK_DEF_ARN"

      - name: Wait for ECS stabilization
        run: |
          echo "Waiting for new server task to be running..."
          aws ecs wait services-stable --cluster default --services signal-relay

      - name: Wait for CDN propagation
        run: sleep 20

      # --- Smoke test ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Smoke test (client + server coherence)
        id: smoke
        continue-on-error: true
        run: SMOKE_URL=https://signal.ratimics.com/play/ npx playwright test

      - name: Upload smoke results
        if: steps.smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/

      # --- Rollback BOTH on failure ---
      - name: Rollback client
        if: steps.smoke.outcome == 'failure' && steps.snapshot-client.outputs.has_snapshot == 'true'
        run: |
          echo "::error::Smoke tests failed — rolling back client"
          aws s3 sync /tmp/rollback-client/ s3://signal-ratimics-client/ --delete
          aws cloudfront create-invalidation --distribution-id E32W3RMW5O86FJ --paths "/*"

      - name: Rollback server
        if: steps.smoke.outcome == 'failure'
        run: |
          echo "::error::Smoke tests failed — rolling back server to previous task definition"
          aws ecs update-service \
            --cluster default \
            --service signal-relay \
            --task-definition "${{ steps.snapshot-server.outputs.task_def_arn }}"

      - name: Fail if smoke tests failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1

  # Native builds: only after basic tests pass. fail-fast cancels
  # the whole matrix the moment any platform breaks.
  native:
    needs: test-basic
    timeout-minutes: 25
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgl-dev libx11-dev libxi-dev libxcursor-dev libasound2-dev

      - name: Build
        shell: bash
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGIT_HASH=$GIT_HASH
          cmake --build build --config Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signal-${{ matrix.name }}
          path: build/
